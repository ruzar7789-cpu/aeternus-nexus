<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminál [KLÍČ]</title>
    <style>
        body { margin: 0; background: black; color: #00ff00; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { position: relative; z-index: 2; text-align: center; pointer-events: none; text-shadow: 0 0 5px #00ff00; }
        .status { font-size: 1.2em; margin-bottom: 20px; }
        #trigger { pointer-events: auto; padding: 15px 30px; border: 1px solid #00ff00; background: rgba(0, 255, 0, 0.1); color: #00ff00; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div class="status">SYSTÉM: ČEKÁ NA AUTORIZACI...</div>
        <button id="trigger">AKTIVOVAT [KLÍČ]</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const trigger = document.getElementById('trigger');
        let audioCtx, oscillatorL, oscillatorR, merger;
        let isActive = false;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function startAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            merger = audioCtx.createChannelMerger(2);

            // Levé ucho: 200 Hz
            oscillatorL = audioCtx.createOscillator();
            oscillatorL.frequency.setValueAtTime(200, audioCtx.currentTime);
            const pannerL = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : audioCtx.createPanner();
            if(pannerL.pan) pannerL.pan.value = -1;
            oscillatorL.connect(pannerL);
            pannerL.connect(merger);

            // Pravé ucho: 206 Hz (Vytváří 6Hz Theta vlnu)
            oscillatorR = audioCtx.createOscillator();
            oscillatorR.frequency.setValueAtTime(206, audioCtx.currentTime);
            const pannerR = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : audioCtx.createPanner();
            if(pannerR.pan) pannerR.pan.value = 1;
            oscillatorR.connect(pannerR);
            pannerR.connect(merger);

            merger.connect(audioCtx.destination);
            oscillatorL.start();
            oscillatorR.start();
        }

        function draw() {
            if (!isActive) return;
            // Vizuální pulsace (10Hz Alfa)
            const alpha = 0.05 + Math.abs(Math.sin(Date.now() / 100)) * 0.2;
            ctx.fillStyle = `rgba(0, 255, 0, ${alpha})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Geometrický kód
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.beginPath();
            const time = Date.now() * 0.002;
            ctx.arc(canvas.width/2, canvas.height/2, 100 + Math.sin(time)*10, 0, Math.PI * 2);
            ctx.stroke();
            
            requestAnimationFrame(draw);
        }

        trigger.addEventListener('click', () => {
            if (!isActive) {
                isActive = true;
                trigger.style.display = 'none';
                document.querySelector('.status').innerText = 'REŽIM ADMINISTRÁTORA AKTIVNÍ';
                startAudio();
                draw();
            }
        });
    </script>
</body>
</html>
