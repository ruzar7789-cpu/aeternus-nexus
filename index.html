<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMF Sentinel - Bio-Sensor</title>
    <style>
        body { margin: 0; background: #050505; color: #00ff41; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 1px solid #00ff41; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); width: 90%; max-width: 600px; height: 300px; }
        #controls { margin-top: 20px; text-align: center; }
        button { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 10px 20px; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        button:hover { background: #00ff41; color: #000; }
        .data { font-size: 1.5rem; margin-bottom: 10px; }
        .warning { color: #ff3e3e; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="data">Magnetická indukce: <span id="val">0</span> µT</div>
    <canvas id="chart"></canvas>
    <div id="controls">
        <button id="startBtn">AKTIVOVAT SENZORY</button>
        <p id="status">Status: Čekám na operátora...</p>
        <div id="warning" class="warning">Senzor není dostupný nebo chybí oprávnění HTTPS.</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
