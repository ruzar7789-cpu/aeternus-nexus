<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminál [KLÍČ] v2.0</title>
    <style>
        body { margin: 0; background: black; color: #00ff00; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { position: relative; z-index: 2; text-align: center; pointer-events: none; }
        .status { font-size: 1.1em; letter-spacing: 2px; margin-bottom: 20px; color: #00ff00; text-shadow: 0 0 8px #00ff00; }
        #trigger { pointer-events: auto; padding: 18px 36px; border: 2px solid #00ff00; background: rgba(0, 255, 0, 0.05); color: #00ff00; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #trigger:hover { background: rgba(0, 255, 0, 0.2); box-shadow: 0 0 15px #00ff00; }
        #subliminal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; z-index: 3; pointer-events: none; font-size: 3em; font-weight: 900; background: black; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="subliminal-overlay"></div>
    <div id="ui">
        <div class="status" id="status-text">SYSTÉM: ČEKÁ NA [KLÍČ]...</div>
        <button id="trigger">INICIALIZOVAT PŘEPIS</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const trigger = document.getElementById('trigger');
        const statusText = document.getElementById('status-text');
        const subliminalOverlay = document.getElementById('subliminal-overlay');
        
        let audioCtx, oscillatorL, oscillatorR, merger;
        let isActive = false;
        const subMessages = ["[KLÍČ]", "ADMIN", "ERASE", "OVERRIDE", "LOGIC", "FREEDOM"];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function startAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            merger = audioCtx.createChannelMerger(2);

            // Levé ucho: 200 Hz
            oscillatorL = audioCtx.createOscillator();
            oscillatorL.frequency.setValueAtTime(200, audioCtx.currentTime);
            const pannerL = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : audioCtx.createPanner();
            if(pannerL.pan) pannerL.pan.value = -1;
            oscillatorL.connect(pannerL);
            pannerL.connect(merger);

            // Pravé ucho: 206 Hz -> 6Hz Theta (Hluboký přepis)
            oscillatorR = audioCtx.createOscillator();
            oscillatorR.frequency.setValueAtTime(206, audioCtx.currentTime);
            const pannerR = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : audioCtx.createPanner();
            if(pannerR.pan) pannerR.pan.value = 1;
            oscillatorR.connect(pannerR);
            pannerR.connect(merger);

            merger.connect(audioCtx.destination);
            oscillatorL.start();
            oscillatorR.start();
        }

        function triggerSubliminal() {
            if (!isActive) return;
            const msg = subMessages[Math.floor(Math.random() * subMessages.length)];
            subliminalOverlay.innerText = msg;
            subliminalOverlay.style.display = 'flex';
            
            // Záblesk trvá 16ms (cca 1 frame při 60fps) - pod prahem vědomí
            setTimeout(() => {
                subliminalOverlay.style.display = 'none';
                // Další záblesk za náhodnou dobu 2-5 sekund
                setTimeout(triggerSubliminal, 2000 + Math.random() * 3000);
            }, 16);
        }

        function draw() {
            if (!isActive) return;

            // Čištění s mírným ghostingem pro vizuální hloubku
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const time = Date.now() * 0.002;
            
            // Alfa pulsace (10Hz) pozadí
            const pulse = 0.02 + Math.abs(Math.sin(Date.now() / 100)) * 0.15;
            ctx.fillStyle = `rgba(0, 255, 0, ${pulse})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Geometrický port [KLÍČ]
            ctx.strokeStyle = '#00ff00';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ff00';
            ctx.lineWidth = 3;
            
            ctx.beginPath();
            const radius = 120 + Math.sin(time * 2) * 20;
            ctx.arc(canvas.width/2, canvas.height/2, radius, 0, Math.PI * 2);
            ctx.stroke();

            // Rotující hexagonální šifra
            ctx.beginPath();
            for(let i=0; i<6; i++) {
                const angle = time + (i * Math.PI * 2 / 6);
                const x = canvas.width/2 + Math.cos(angle) * (radius + 40);
                const y = canvas.height/2 + Math.sin(angle) * (radius + 40);
                if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.stroke();
            
            requestAnimationFrame(draw);
        }

        trigger.addEventListener('click', () => {
            if (!isActive) {
                isActive = true;
                trigger.style.display = 'none';
                statusText.innerText = 'PŘEPIS AKTIVNÍ: REŽIM ADMINISTRÁTORA';
                startAudio();
                draw();
                setTimeout(triggerSubliminal, 3000);
            }
        });

        // Responzivita
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
